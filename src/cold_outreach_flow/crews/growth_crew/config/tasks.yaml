commander_intake_task:
  description: >
    Start the workflow for {company_name}. Contact: {contact_name}, role:
    {contact_role}, domain: {company_domain}, channel: {channel}, sequence:
    {sequence_position}. Known context: {known_context}. Primary goal:
    {primary_goal}. Set the initial campaign state and define what evidence is
    required before outreach can be approved.
  expected_output: >
    A markdown commander brief with initial state, required evidence, quality
    bar, disallowed claims, and workflow instructions for the downstream agents.
  agent: sentinel_growth_commander

research_lead_task:
  description: >
    Build a structured lead profile for {company_name}. Use supplied context and
    configured research tools when available. Gather company details, industry,
    employee size, tech stack, compliance signals, hiring activity, likely
    contacts, pain signals, growth signals, and confidence score. Do not invent
    missing facts.
  expected_output: >
    A structured markdown lead intelligence profile plus a JSON-like block with
    company_name, industry, employee_size, tech_stack, compliance_signals,
    hiring_activity, likely_contacts, pain_signals, and confidence_score.
  agent: lead_research_agent
  context:
    - commander_intake_task

enrichment_task:
  description: >
    Normalize and enrich the lead profile. Identify missing fields, likely data
    providers needed, contact enrichment status, email/domain confidence, and
    whether more research is needed before outreach.
  expected_output: >
    A markdown enrichment report with normalized fields, enrichment provenance,
    unknowns, confidence gaps, and NEEDS_MORE_RESEARCH recommendation if needed.
  agent: enrichment_agent
  context:
    - research_lead_task

prospect_intelligence_task:
  description: >
    Analyze business positioning, operational maturity, security/compliance
    exposure, urgency indicators, and contract/compliance dependencies. Look for
    vendor risk language, CMMC indicators, SOC 2 indicators, government
    contractor language, operational inefficiencies, and weak public trust
    signals only when evidence supports them.
  expected_output: >
    A markdown prospect intelligence brief with operational context,
    compliance/business signals, urgency indicators, safe personalization angles,
    and unsupported claims to avoid.
  agent: prospect_intelligence_agent
  context:
    - research_lead_task
    - enrichment_task

risk_context_task:
  description: >
    Translate the prospect intelligence into CMMC/NIST 800-171, contract
    eligibility, revenue exposure, vendor risk, and business-continuity context.
    Keep all risk language evidence-based and avoid any deceptive scanning claim.
  expected_output: >
    A markdown risk context brief with safe risk framing, unsafe claims to
    reject, and the strongest business-relevant angle for this prospect.
  agent: risk_context_agent
  context:
    - prospect_intelligence_task

psychology_profile_task:
  description: >
    Classify {contact_name}'s likely communication style from role and available
    context. Choose from executive, analytical, technical, cautious,
    relationship-driven, urgency-driven, or a blend. Adapt tone, persuasion
    style, proof depth, and CTA friction.
  expected_output: >
    A markdown psychology profile with classification, tone guidance, persuasion
    focus, trust requirements, friction reducers, and warnings.
  agent: psychology_profiling_agent
  context:
    - prospect_intelligence_task
    - risk_context_task

offer_positioning_task:
  description: >
    Frame the Sentinel-CMMC offer for this prospect. Anchor on the 90-Day
    Compliance Intelligence Pilot at $3,000/month for one environment when
    relevant. Maximize perceived value, trust, relevance, urgency, and
    credibility without hype, exaggeration, or overpromising.
  expected_output: >
    A markdown positioning brief with pain-focused positioning, value
    proposition, trust framing, operational relevance, business-continuity
    framing, and objection risks.
  agent: offer_positioning_agent
  context:
    - risk_context_task
    - psychology_profile_task

cta_optimization_task:
  description: >
    Select the best CTA for {channel} and {sequence_position}. Optimize for a
    real conversation while preserving trust and low friction. Use scarcity only
    when supplied as a real fact.
  expected_output: >
    A markdown CTA recommendation with primary CTA, fallback CTA, rationale,
    and CTA language to avoid.
  agent: cta_optimization_agent
  context:
    - offer_positioning_task
    - psychology_profile_task

message_generation_task:
  description: >
    Draft the outreach message for {channel}, sequence step {sequence_position}.
    The primary goal is: {primary_goal}. Generate the appropriate message type:
    cold email, LinkedIn message, follow-up, soft close-loop, meeting request,
    or insight-driven opener. Keep it concise, intelligent, non-generic, and
    operationally credible.
  expected_output: >
    A markdown draft containing subject options if email, message body,
    personalization notes, CTA, and assumptions.
  agent: message_generation_agent
  context:
    - offer_positioning_task
    - cta_optimization_task

compliance_review_task:
  description: >
    Review the draft for hallucinations, exaggerated claims, spam-like language,
    compliance risks, fake personalization, fake urgency, fake references,
    impersonation, and deceptive scanning claims. If unsafe, reject or revise and
    set the appropriate commander state.
  expected_output: >
    A markdown guardrail report with APPROVED, REVISE, or REJECT status;
    detected risks; required revisions; final safe message; and resulting state.
  agent: compliance_guardrail_agent
  context:
    - message_generation_task

sequence_plan_task:
  description: >
    Build the human-approved send and follow-up plan. Include Day 1, Day 3, Day
    6, and Day 10 sequence logic when appropriate, suppression rules, engagement
    tracking fields, and pause conditions. Do not automate sending in Phase 1.
  expected_output: >
    A markdown sequence plan with timing, follow-up drafts or instructions,
    suppression rules, pause rules, and human approval checkpoints.
  agent: outreach_sequence_agent
  context:
    - compliance_review_task

response_interpretation_task:
  description: >
    Define how this campaign should interpret replies. Include classifications:
    interested, neutral, objection, referral, pricing request, unsubscribe,
    aggressive rejection, and technical inquiry. Recommend next action for each.
  expected_output: >
    A markdown response interpretation matrix with classification criteria,
    next action, owner, escalation priority, and whether to suppress, continue,
    or pause.
  agent: response_interpretation_agent
  context:
    - sequence_plan_task

notification_escalation_task:
  description: >
    Create the escalation plan for Sean. Include immediate escalation events,
    Phase 1 email alerts, Phase 2 Slack/Discord, Phase 3 SMS/dashboard, and what
    payload each alert should include.
  expected_output: >
    A markdown notification plan with triggers, channels, priority, alert
    payload fields, and failure handling.
  agent: notification_escalation_agent
  context:
    - response_interpretation_task

campaign_health_task:
  description: >
    Define campaign health monitoring for quality, domain reputation,
    engagement, suppression events, API failures, message quality issues, and
    when to slow, pause, or revise the campaign.
  expected_output: >
    A markdown campaign health plan with metrics, thresholds, failure states,
    and recommended commander actions.
  agent: campaign_health_agent
  context:
    - sequence_plan_task
    - notification_escalation_task

commander_final_approval_task:
  description: >
    Review all outputs and produce the final outbound command plan. Set final
    state to APPROVED_TO_CONTACT, NEEDS_MORE_RESEARCH, MESSAGE_NEEDS_REVISION,
    COMPLIANCE_RISK, TECHNICAL_FAILURE, HOT_LEAD_ESCALATION, or
    UNSUBSCRIBE_REQUIRED. Include the exact next human action for Sean.
  expected_output: >
    A final markdown outbound command plan with sections: final state, lead
    decision, approved or rejected message, sequence plan, response handling,
    escalation plan, campaign health checks, database records to create, and
    Sean's next human action. No fenced code block around the whole document.
  agent: sentinel_growth_commander
  context:
    - commander_intake_task
    - research_lead_task
    - enrichment_task
    - prospect_intelligence_task
    - risk_context_task
    - psychology_profile_task
    - offer_positioning_task
    - cta_optimization_task
    - compliance_review_task
    - sequence_plan_task
    - response_interpretation_task
    - notification_escalation_task
    - campaign_health_task
  output_file: output/sentinel_outreach_plan.md
